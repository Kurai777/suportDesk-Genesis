# Evolution API v2 (piloto do WhatsApp) — SEPARADO do docker-compose.yml (que é só o
# Postgres de dev da IA). A Evolution tem banco e cache PRÓPRIOS; não compartilha nada
# com o pgvector da aplicação.
#
#   docker compose -f docker-compose.evolution.yml up -d      # sobe Evolution + Postgres + Redis
#   docker compose -f docker-compose.evolution.yml logs -f evolution
#   docker compose -f docker-compose.evolution.yml down       # para (mantém os volumes)
#
# Depois de subir: painel em http://localhost:8080 (Manager) — ver TESTE_WHATSAPP.md.
# A AUTHENTICATION_API_KEY abaixo é a chave GLOBAL (cria/gerencia instâncias). Troque por
# um valor seu antes de expor isto em qualquer lugar que não seja a sua máquina local.

services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      # Chave GLOBAL da Evolution (cria instâncias). Local/dev — troque para produção.
      AUTHENTICATION_API_KEY: genesis-evolution-local-key
      # Banco (Postgres próprio da Evolution)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache (Redis próprio)
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances

  evolution-postgres:
    image: postgres:16
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7
    container_name: evolution-redis
    restart: unless-stopped
    volumes:
      - evolution_redis:/data

volumes:
  evolution_instances:
  evolution_pgdata:
  evolution_redis:
